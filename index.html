<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NatBee - Trono del Nectar</title>
  <style>
    :root {
      --bg: #070f16;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: "Segoe UI", Tahoma, sans-serif;
      position: relative;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #102131;
      cursor: default;
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    #bee-layer {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 4;
    }

    #bee-layer canvas {
      background: transparent !important;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="bee-layer"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.4.2/pixi.min.js"></script>
  <script>
    const OWS_API_BASE = 'https://owsdatabase.onrender.com';
    (function initOwsProjectGuard() {
      const mountGuard = () => {
        if (!window.OWSProjectRestrictionGuard || typeof window.OWSProjectRestrictionGuard.mount !== 'function') return;
        window.OWSProjectRestrictionGuard.mount({
          apiBaseUrl: OWS_API_BASE,
          projectSlug: 'natbee',
          projectName: 'NatBee',
          checkIntervalMs: 30000
        });
      };
      if (window.OWSProjectRestrictionGuard) {
        mountGuard();
        return;
      }
      const s = document.createElement('script');
      s.src = 'https://owsdatabase.onrender.com/shared/ows-project-guard.js';
      s.async = true;
      s.onload = mountGuard;
      document.head.appendChild(s);
    })();

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    function fitCanvas() {
      const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      const w = Math.floor(window.innerWidth);
      const h = Math.floor(window.innerHeight);
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      world.w = w;
      world.h = h;
      world.splitX = Math.floor(world.w * 0.72);
      recalcHudRects();
      resetPlayerInsideBounds();
      BeeFx.resize();
    }

    const world = { w: 1280, h: 720, splitX: 920 };

    const AREAS = [
      {
        id: 1,
        name: 'Area 1: Jardin de las Coronas',
        fieldName: 'Pradera de Orquideas',
        fieldsLabel: 'Orquideas • Margaritas • Camelias',
        biomes: [
          { id: 'orquidea', name: 'Terrazas de Orquideas', x0: 0.00, x1: 0.33, quota: 18, type: 'orchid' },
          { id: 'margarita', name: 'Claro de Margaritas', x0: 0.33, x1: 0.66, quota: 17, type: 'daisy' },
          { id: 'camelia', name: 'Linde de Camelias', x0: 0.66, x1: 1.00, quota: 15, type: 'camellia' }
        ]
      }
    ];

    const FLOWER_TYPES = {
      orchid: { name: 'Orquidea', petalsA: '#8f78ff', petalsB: '#c39bff', center: '#ffe6a6', pollenMin: 3, pollenMax: 6, royalBonus: 2 },
      daisy: { name: 'Margarita', petalsA: '#f9f9f2', petalsB: '#f0efe3', center: '#ffcc4d', pollenMin: 2, pollenMax: 5, royalBonus: 1 },
      camellia: { name: 'Camelia', petalsA: '#ff6f93', petalsB: '#ff3f72', center: '#ffd8c6', pollenMin: 4, pollenMax: 8, royalBonus: 2 }
    };

    const state = {
      areaIndex: 0,
      zone: 'field',
      hiveRoofFade: 1,
      pollen: 0,
      pollenCap: 25,
      royalPollen: 0,
      honey: 0,
      upgrades: { cap: 0, speed: 0, refine: 0 }
    };

    const player = {
      x: 220,
      y: 320,
      vx: 0,
      vy: 0,
      speed: 220,
      bob: 0
    };

    const keys = Object.create(null);
    const flowers = [];
    const hiveCells = [];
    const hiveBees = [];
    const fxParticles = [];
    const uiButtons = [];
    const uiNotice = { text: '', kind: 'info', timer: 0 };
    let lastPointerDownAt = 0;
    const uiState = {
      panelOpen: false,
      colonyOpen: false,
      inventoryOpen: false,
      selectedRole: 'offensive'
    };
    const BeeFx = {
      enabled: false,
      app: null,
      stage: null,
      queenLayer: null,
      hiveLayer: null,
      unitLayer: null,
      alertLayer: null,
      hudLayer: null,
      textures: {},
      queen: null,
      hiveSprites: [],
      unitSprites: new Map(),
      glowFilter: null,
      layerEl: null,
      async init() {
        if (this.enabled || !window.PIXI) return;
        this.layerEl = document.getElementById('bee-layer');
        if (!this.layerEl) return;

        try {
          this.app = new PIXI.Application({
            width: Math.max(1, window.innerWidth),
            height: Math.max(1, window.innerHeight),
            antialias: true,
            transparent: true,
            backgroundAlpha: 0,
            backgroundColor: 0x000000,
            resolution: Math.max(1, Math.min(2, window.devicePixelRatio || 1)),
            autoDensity: true,
            clearBeforeRender: true
          });
        } catch (err) {
          console.error('BeeFx init failed:', err);
          this.enabled = false;
          return;
        }
        this.layerEl.innerHTML = '';
        this.layerEl.appendChild(this.app.view);
        this.app.view.style.width = '100%';
        this.app.view.style.height = '100%';
        this.app.view.style.pointerEvents = 'none';
        this.app.view.style.background = 'transparent';

        try {
          if (this.app.renderer?.background) {
            this.app.renderer.background.alpha = 0;
            this.app.renderer.background.color = 0x000000;
          }
          if (this.app.renderer?.gl?.clearColor) {
            this.app.renderer.gl.clearColor(0, 0, 0, 0);
          }
        } catch (_) {}

        this.stage = new PIXI.Container();
        this.queenLayer = new PIXI.Container();
        this.hiveLayer = new PIXI.Container();
        this.unitLayer = new PIXI.Container();
        this.alertLayer = new PIXI.Container();
        this.hudLayer = new PIXI.Container();
        this.stage.addChild(this.hiveLayer, this.unitLayer, this.queenLayer, this.alertLayer, this.hudLayer);
        this.app.stage.addChild(this.stage);

        try {
          this.glowFilter = new PIXI.BlurFilter(0.3);
          this.unitLayer.filters = [this.glowFilter];
        } catch (_) {}

        this.textures.queen = this.createBeeTexture('#f9d66d', '#1f1f24', '#fef4db', 74, true);
        this.textures.hive = this.createBeeTexture('#ffcc55', '#1f1f24', '#d6f1ff', 18, false);
        this.textures.offensive = this.createBeeTexture('#ff5b76', '#1f1f24', '#ffd9df', 34, false);
        this.textures.worker = this.createBeeTexture('#ffd88d', '#1f1f24', '#fff2cb', 31, false);
        this.textures.pollinator = this.createBeeTexture('#9ec7ff', '#1f1f24', '#d9e9ff', 31, false);

        this.queen = new PIXI.Sprite(this.textures.queen);
        this.queen.anchor.set(0.5);
        this.queenLayer.addChild(this.queen);
        this.enabled = true;
      },
      resize() {
        if (!this.enabled || !this.app) return;
        const w = Math.max(1, window.innerWidth);
        const h = Math.max(1, window.innerHeight);
        this.app.renderer.resize(w, h);
      },
      createBeeTexture(mainColor, stripeColor, wingColor, size, crowned = false) {
        const g = new PIXI.Graphics();
        const half = size * 0.5;
        const bodyW = size * 0.72;
        const bodyH = size * 0.48;

        g.beginFill(wingColor, 0.62);
        g.drawEllipse(-size * 0.18, -size * 0.2, size * 0.2, size * 0.13);
        g.drawEllipse(size * 0.18, -size * 0.2, size * 0.2, size * 0.13);
        g.endFill();

        g.beginFill(mainColor, 1);
        g.drawEllipse(0, 0, bodyW * 0.5, bodyH * 0.5);
        g.endFill();

        g.beginFill(stripeColor, 0.88);
        g.drawRect(-bodyW * 0.32, -bodyH * 0.45, bodyW * 0.16, bodyH * 0.9);
        g.drawRect(-bodyW * 0.08, -bodyH * 0.48, bodyW * 0.16, bodyH * 0.96);
        g.drawRect(bodyW * 0.16, -bodyH * 0.44, bodyW * 0.14, bodyH * 0.88);
        g.endFill();

        g.beginFill(0x161922, 1);
        g.drawCircle(-bodyW * 0.34, -bodyH * 0.02, size * 0.09);
        g.endFill();

        g.beginFill(0x020409, 1);
        g.drawCircle(-bodyW * 0.37, -bodyH * 0.03, size * 0.02);
        g.endFill();

        g.lineStyle(Math.max(1, size * 0.03), stripeColor, 0.95);
        g.moveTo(bodyW * 0.45, 0);
        g.lineTo(bodyW * 0.64, 0);
        g.lineTo(bodyW * 0.78, size * 0.07);

        if (crowned) {
          g.beginFill(0xffe79a, 1);
          g.drawPolygon([
            -size * 0.14, -size * 0.34,
            -size * 0.05, -size * 0.48,
            0, -size * 0.34,
            size * 0.05, -size * 0.48,
            size * 0.14, -size * 0.34
          ]);
          g.endFill();
        }

        return this.app.renderer.generateTexture(g, {
          region: new PIXI.Rectangle(-half, -half, size, size),
          resolution: 2
        });
      },
      getUnitTexture(role) {
        if (role === 'offensive') return this.textures.offensive;
        if (role === 'worker') return this.textures.worker;
        return this.textures.pollinator;
      },
      ensureHiveSprites() {
        if (!this.enabled) return;
        while (this.hiveSprites.length < hiveBees.length) {
          const sp = new PIXI.Sprite(this.textures.hive);
          sp.anchor.set(0.5);
          sp.alpha = 0.9;
          this.hiveLayer.addChild(sp);
          this.hiveSprites.push(sp);
        }
        while (this.hiveSprites.length > hiveBees.length) {
          const sp = this.hiveSprites.pop();
          this.hiveLayer.removeChild(sp);
          sp.destroy();
        }
      },
      ensureUnitSprites() {
        if (!this.enabled) return;
        const allUnits = [...offensiveBees, ...workerBeesUnits, ...pollinatorBees];
        const alive = new Set();
        for (const u of allUnits) {
          alive.add(u.id);
          if (!this.unitSprites.has(u.id)) {
            const sp = new PIXI.Sprite(this.getUnitTexture(u.role));
            sp.anchor.set(0.5);
            sp.alpha = 0.95;
            this.unitLayer.addChild(sp);
            this.unitSprites.set(u.id, sp);
          }
        }
        for (const [id, sp] of this.unitSprites.entries()) {
          if (alive.has(id)) continue;
          this.unitLayer.removeChild(sp);
          sp.destroy();
          this.unitSprites.delete(id);
        }
      },
      clearLayer(layer) {
        if (!layer) return;
        const children = layer.removeChildren();
        for (const child of children) {
          child.destroy({ children: true });
        }
      },
      toColor(value, fallback = 0xffffff) {
        try {
          if (typeof value === 'number') return value;
          return PIXI.utils.string2hex(value || '#ffffff');
        } catch (_) {
          return fallback;
        }
      },
      addRoundedRect(layer, x, y, w, h, r, fillColor, fillAlpha = 1, strokeColor = null, strokeAlpha = 1, lineWidth = 1) {
        const g = new PIXI.Graphics();
        if (fillColor !== null && fillColor !== undefined) {
          g.beginFill(this.toColor(fillColor), fillAlpha);
          g.drawRoundedRect(x, y, w, h, r);
          g.endFill();
        }
        if (strokeColor !== null && strokeColor !== undefined && lineWidth > 0) {
          g.lineStyle(lineWidth, this.toColor(strokeColor), strokeAlpha);
          g.drawRoundedRect(x, y, w, h, r);
        }
        layer.addChild(g);
        return g;
      },
      addText(layer, text, x, y, opts = {}) {
        const t = new PIXI.Text(text, new PIXI.TextStyle({
          fontFamily: opts.fontFamily || 'Segoe UI',
          fontSize: opts.fontSize || 12,
          fill: this.toColor(opts.fill || '#ffffff'),
          fontWeight: opts.fontWeight || 'normal'
        }));
        t.x = x;
        t.y = y;
        layer.addChild(t);
        return t;
      },
      drawExclamationMarkPixi(x, y, scale = 1, alpha = 1) {
        const s = Math.max(0.6, scale);
        const g = new PIXI.Graphics();
        g.x = x;
        g.y = y;
        g.scale.set(s);
        g.alpha = Math.max(0, Math.min(1, alpha));

        g.beginFill(0xffd678, 0.30);
        g.drawCircle(0, 0, 14);
        g.endFill();

        g.lineStyle(1.7, 0xffd678, 0.95);
        g.beginFill(0x101a28, 0.88);
        g.drawRoundedRect(-11, -12, 22, 24, 8);
        g.endFill();

        g.beginFill(0xfff0c4, 1);
        g.drawRoundedRect(-2, -9, 4, 13, 2);
        g.endFill();
        g.beginFill(0xffcf7e, 1);
        g.drawCircle(0, 8.6, 1.9);
        g.endFill();
        this.alertLayer.addChild(g);
      },
      drawEggIconPixi(layer, x, y, size, itemDef, alpha = 1) {
        const r = size * 0.48;
        const container = new PIXI.Container();
        container.x = x;
        container.y = y;
        container.alpha = alpha;

        const shell = new PIXI.Graphics();
        shell.beginFill(this.toColor(itemDef.colorA), 1);
        shell.drawEllipse(0, 0, r * 0.82, r);
        shell.endFill();
        shell.beginFill(this.toColor(itemDef.colorB), 0.34);
        shell.drawEllipse(r * 0.08, r * 0.1, r * 0.66, r * 0.84);
        shell.endFill();
        container.addChild(shell);

        const symbol = new PIXI.Graphics();
        symbol.lineStyle(Math.max(1.4, size * 0.1), this.toColor(itemDef.accent), 1);
        if (itemDef.hatchRole === 'offensive') {
          symbol.moveTo(-r * 0.18, -r * 0.1);
          symbol.lineTo(r * 0.05, -r * 0.34);
          symbol.lineTo(r * 0.3, -r * 0.08);
          symbol.lineTo(r * 0.04, r * 0.12);
          symbol.lineTo(r * 0.26, r * 0.36);
        } else if (itemDef.hatchRole === 'worker') {
          symbol.drawCircle(0, 0, r * 0.26);
          symbol.moveTo(0, -r * 0.26);
          symbol.lineTo(0, r * 0.26);
          symbol.moveTo(-r * 0.26, 0);
          symbol.lineTo(r * 0.26, 0);
        } else {
          symbol.moveTo(-r * 0.26, r * 0.12);
          symbol.quadraticCurveTo(0, -r * 0.36, r * 0.26, r * 0.12);
          symbol.quadraticCurveTo(0, r * 0.34, -r * 0.26, r * 0.12);
        }
        container.addChild(symbol);
        layer.addChild(container);
      },
      renderRaidAlertsPixi() {
        this.clearLayer(this.alertLayer);
        if (enemies.length <= 0 && raidState.flash <= 0.02) return;
        const pulse = 0.5 + Math.sin(raidState.pulse * 2.4) * 0.5;
        const alpha = Math.max(0.35, Math.min(1, raidState.flash + pulse * 0.45));
        for (const b of offensiveBees) {
          this.drawExclamationMarkPixi(
            b.x,
            b.y - 19 - Math.sin((b.wobble || 0) * 2.1) * 3,
            0.86 + pulse * 0.08,
            alpha
          );
        }
      },
      renderHudPixi() {
        this.clearLayer(this.hudLayer);
        uiButtons.length = 0;
        const layer = this.hudLayer;
        const topY = 12;
        this.addRoundedRect(layer, 14, topY, 108, 30, 9, '#060e18', 0.72, '#ffffff', 0.18);
        this.addRoundedRect(layer, 128, topY, 122, 30, 9, '#060e18', 0.72, '#ffffff', 0.18);
        this.addRoundedRect(layer, 256, topY, 138, 30, 9, '#060e18', 0.72, '#ffffff', 0.18);
        this.addText(layer, 'Panel', 49, topY + 7, { fontSize: 13, fontWeight: 'bold', fill: '#dff3ff' });
        this.addText(layer, 'Colonia', 167, topY + 7, { fontSize: 13, fontWeight: 'bold', fill: '#dff3ff' });
        this.addText(layer, 'Inventario', 293, topY + 7, { fontSize: 13, fontWeight: 'bold', fill: '#dff3ff' });
        uiButtons.push({ x: 14, y: topY, w: 108, h: 30, action: () => { uiState.panelOpen = !uiState.panelOpen; } });
        uiButtons.push({ x: 128, y: topY, w: 122, h: 30, action: () => { uiState.colonyOpen = !uiState.colonyOpen; } });
        uiButtons.push({ x: 256, y: topY, w: 138, h: 30, action: () => { uiState.inventoryOpen = !uiState.inventoryOpen; } });

        if (uiState.panelOpen) {
          const modalW = Math.min(460, world.w * 0.4);
          const mx = 18;
          const my = 52;
          this.addRoundedRect(layer, mx, my, modalW, 300, 12, '#08101c', 0.82, '#ffffff', 0.24);
          this.addText(layer, 'Panel de Colmena', mx + 14, my + 10, { fontSize: 20, fontWeight: 'bold', fill: '#f5fbff' });
          this.addText(layer, 'Gestion rapida sin tapar el juego', mx + 14, my + 30, { fontSize: 11, fill: '#9ab2ca' });

          const cardGap = 8;
          const cardW = Math.floor((modalW - 14 * 2 - cardGap) / 2);
          const cards = [
            { x: mx + 14, y: my + 52, w: cardW, h: 42, label: 'Carga', value: `${state.pollen}/${state.pollenCap}` },
            { x: mx + 14 + cardW + cardGap, y: my + 52, w: cardW, h: 42, label: 'Nectar', value: `${state.honey}` },
            { x: mx + 14, y: my + 98, w: cardW, h: 42, label: 'Raiders', value: `${enemies.length}` },
            { x: mx + 14 + cardW + cardGap, y: my + 98, w: cardW, h: 42, label: 'Polen R', value: `${state.royalPollen}` }
          ];
          for (const card of cards) {
            this.addRoundedRect(layer, card.x, card.y, card.w, card.h, 8, '#07121e', 0.62, '#ffffff', 0.18);
            this.addText(layer, card.label.toUpperCase(), card.x + 9, card.y + 4, { fontSize: 10, fill: '#9bb8d4' });
            this.addText(layer, card.value, card.x + 9, card.y + 18, { fontSize: 21, fontWeight: 'bold', fill: '#edf6ff' });
          }

          const upgrades = [
            { key: 'cap', title: 'Alforja Real', desc: '+5 carga' },
            { key: 'speed', title: 'Impulso Alado', desc: '+18 velocidad' },
            { key: 'refine', title: 'Refinado Ambar', desc: '+20% conversion' }
          ];
          let uy = my + 146;
          const uw = modalW - 28;
          for (const up of upgrades) {
            const def = upgradeDefs[up.key];
            const lvl = state.upgrades[up.key] || 0;
            const maxed = lvl >= def.max;
            const cost = getUpgradeCost(up.key);
            const canBuy = !maxed && state.royalPollen >= cost;
            this.addRoundedRect(layer, mx + 14, uy, uw, 38, 7, '#000000', 0.22, '#ffffff', 0.16);
            this.addText(layer, up.title, mx + 24, uy + 5, { fontSize: 13, fontWeight: 'bold', fill: '#f2fbff' });
            this.addText(
              layer,
              maxed ? `Nvl ${lvl}/${def.max} - MAX` : `Nvl ${lvl}/${def.max} - ${up.desc} - Costo ${cost}`,
              mx + 24,
              uy + 21,
              { fontSize: 10, fill: '#9db4cb' }
            );
            const bx = mx + 14 + uw - 82;
            const by = uy + 8;
            this.addRoundedRect(
              layer,
              bx, by, 72, 22, 7,
              maxed ? '#828282' : (canBuy ? '#ffca2b' : '#828282'),
              maxed ? 0.35 : (canBuy ? 0.20 : 0.22),
              maxed ? '#b4b4b4' : (canBuy ? '#ffdc78' : '#b4b4b4'),
              maxed ? 0.35 : (canBuy ? 0.60 : 0.25)
            );
            this.addText(layer, maxed ? 'MAX' : 'MEJORAR', bx + 9, by + 4, { fontSize: 11, fontWeight: 'bold', fill: maxed ? '#d7d7d7' : '#ffe3a5' });
            uiButtons.push({
              x: bx, y: by, w: 72, h: 22,
              action: () => {
                const result = buyUpgrade(up.key);
                if (result === 'insufficient') setUINotice(`Polen Real insuficiente para ${up.title}.`, 'warn');
                else if (result === 'max') setUINotice(`${up.title} ya esta en MAX.`, 'info');
                else if (result === 'ok') setUINotice(`${up.title} mejorado.`, 'ok');
              }
            });
            uy += 43;
          }
        }

        if (uiState.colonyOpen) {
          const sideW = Math.min(390, world.w * 0.34);
          const sx = world.w - sideW - 14;
          const sy = 52;
          const sh = world.h - 66;
          this.addRoundedRect(layer, sx, sy, sideW, sh, 12, '#070e19', 0.88, '#ffffff', 0.24);
          this.addText(layer, 'Menu de Colonia', sx + 14, sy + 9, { fontSize: 19, fontWeight: 'bold', fill: '#ecf7ff' });

          const roles = ['offensive', 'worker', 'pollinator'];
          const roleLabels = { offensive: 'Ofensivas', worker: 'Trabajadoras', pollinator: 'Polinizadoras' };
          for (let i = 0; i < roles.length; i++) {
            const r = roles[i];
            const bx = sx + 14 + i * 122;
            const by = sy + 38;
            const active = uiState.selectedRole === r;
            this.addRoundedRect(
              layer,
              bx, by, 112, 28, 8,
              active ? '#50a8ff' : '#ffffff',
              active ? 0.26 : 0.07,
              active ? '#8bd8ff' : '#ffffff',
              active ? 0.8 : 0.2
            );
            this.addText(layer, roleLabels[r], bx + 12, by + 7, { fontSize: 11, fontWeight: 'bold', fill: active ? '#d9f4ff' : '#a6bcd0' });
            uiButtons.push({ x: bx, y: by, w: 112, h: 28, action: () => { uiState.selectedRole = r; } });
          }

          const speciesList = BEE_SPECIES[uiState.selectedRole] || [];
          let cy = sy + 78;
          for (const sp of speciesList) {
            const unlocked = sp.unlock();
            const active = colony.species[uiState.selectedRole] === sp.id;
            this.addRoundedRect(
              layer,
              sx + 14, cy, sideW - 28, 98, 10,
              active ? '#4f94ff' : '#ffffff',
              active ? 0.16 : 0.04,
              active ? '#88d2ff' : '#ffffff',
              active ? 0.7 : 0.16
            );
            this.addRoundedRect(layer, sx + 24, cy + 12, 38, 38, 8, '#08111c', 0.9, '#ffffff', 0.2);
            this.addText(layer, sp.name, sx + 70, cy + 10, { fontSize: 14, fontWeight: 'bold', fill: '#e9f7ff' });
            this.addText(layer, sp.rarity, sx + 70, cy + 28, { fontSize: 11, fontWeight: 'bold', fill: rarityColor(sp.rarity) });

    const AudioFx = {
      ctx: null,
      started: false,
      lastFlutterAt: 0,
      init() {
        if (this.started) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.started = true;
      },
      flutter(v) {
        if (!this.started || v < 0.25) return;
        const now = performance.now();
        if (now - this.lastFlutterAt < 95) return;
        this.lastFlutterAt = now;
        this.blip(130 + Math.random() * 45, 0.022, 0.008, 'sine');
      },
      blip(freq = 700, dur = 0.06, vol = 0.06, type = 'triangle') {
        if (!this.started) return;
        const t = this.ctx.currentTime;
        const o = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        o.type = type;
        o.frequency.value = freq;
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(vol, t + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        o.connect(g);
        g.connect(this.ctx.destination);
        o.start(t);
        o.stop(t + dur);
      }
    };

    function rand(min, max) { return Math.random() * (max - min) + min; }
    function getCurrentArea() { return AREAS[state.areaIndex] || AREAS[0]; }
    function dist2(ax, ay, bx, by) { const dx = ax - bx; const dy = ay - by; return dx * dx + dy * dy; }

    function getSpecies(role, id) {
      const list = BEE_SPECIES[role] || [];
      return list.find(s => s.id === id) || list[0];
    }

    function getActiveSpecies(role) {
      return getSpecies(role, colony.species[role]);
    }

    function isSpeciesUnlocked(role, id) {
      const s = getSpecies(role, id);
      return !!(s && s.unlock && s.unlock());
    }

    function cycleSpecies(role) {
      const list = BEE_SPECIES[role] || [];
      if (!list.length) return;
      const currentIdx = Math.max(0, list.findIndex(s => s.id === colony.species[role]));
      for (let i = 1; i <= list.length; i++) {
        const s = list[(currentIdx + i) % list.length];
        if (s.unlock()) {
          colony.species[role] = s.id;
          setUINotice(`${role}: ${s.name}`, 'ok');
          return;
        }
      }
      setUINotice(`No hay variantes desbloqueadas para ${role}.`, 'warn');
    }

    function cycleAssignedBiome() {
      const area = getCurrentArea();
      if (!area.biomes.length) return;
      const idx = Math.max(0, area.biomes.findIndex(b => b.id === colony.assignedBiomeId));
      const next = area.biomes[(idx + 1) % area.biomes.length];
      colony.assignedBiomeId = next.id;
      setUINotice(`Polinizadoras asignadas a ${next.name}.`, 'info');
      for (const b of pollinatorBees) b.targetFlowerId = null;
    }

    function getUpgradeCost(key) {
      const d = upgradeDefs[key];
      const lvl = state.upgrades[key] || 0;
      return Math.floor(d.base * Math.pow(d.scale, lvl));
    }

    function setUINotice(text, kind = 'info') {
      uiNotice.text = text;
      uiNotice.kind = kind;
      uiNotice.timer = 1.6;
    }

    function buyUpgrade(key) {
      const d = upgradeDefs[key];
      if (!d) return 'invalid';
      if ((state.upgrades[key] || 0) >= d.max) return 'max';
      const cost = getUpgradeCost(key);
      if (state.royalPollen < cost) return 'insufficient';
      state.royalPollen -= cost;
      state.upgrades[key] += 1;
      d.apply();
      AudioFx.blip(520, 0.08, 0.03, 'triangle');
      return 'ok';
    }

    function countInventoryItem(itemId) {
      return Math.max(0, inventory.items[itemId] || 0);
    }

    function getInventoryOccupiedSlots() {
      return Object.values(inventory.items).filter(v => v > 0).length;
    }

    function getInventoryTotalItems() {
      let total = 0;
      for (const v of Object.values(inventory.items)) total += Math.max(0, v || 0);
      return total;
    }

    function getInventoryItemsList() {
      const out = [];
      for (const [itemId, qty] of Object.entries(inventory.items)) {
        if (qty <= 0) continue;
        const def = ITEM_DEFS[itemId];
        if (!def) continue;
        out.push({ itemId, qty, def });
      }
      out.sort((a, b) => a.def.name.localeCompare(b.def.name, 'es'));
      return out;
    }

    function addInventoryItem(itemId, amount = 1, silent = false) {
      const def = ITEM_DEFS[itemId];
      if (!def || amount <= 0) return false;
      const cur = countInventoryItem(itemId);
      const occupied = getInventoryOccupiedSlots();
      if (cur <= 0 && occupied >= inventory.slots) {
        if (!silent) setUINotice('Inventario lleno. Incuba o libera espacio.', 'warn');
        return false;
      }
      const next = Math.min(inventory.maxStack, cur + amount);
      const gained = next - cur;
      if (gained <= 0) return false;
      inventory.items[itemId] = next;
      if (!silent) {
        setUINotice(`Conseguiste ${gained} ${def.name}.`, 'ok');
      }
      return true;
    }

    function removeInventoryItem(itemId, amount = 1) {
      const cur = countInventoryItem(itemId);
      if (amount <= 0 || cur < amount) return false;
      inventory.items[itemId] = cur - amount;
      return true;
    }

    function roleLabel(role) {
      if (role === 'offensive') return 'Ofensivas';
      if (role === 'worker') return 'Trabajadoras';
      if (role === 'pollinator') return 'Polinizadoras';
      return role;
    }

    function drawEggIcon(x, y, size, itemDef, alpha = 1) {
      const r = size * 0.48;
      ctx.save();
      ctx.translate(x, y);
      const shell = ctx.createLinearGradient(-r, -r, r, r);
      shell.addColorStop(0, itemDef.colorA);
      shell.addColorStop(1, itemDef.colorB);
      ctx.fillStyle = shell;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.ellipse(0, 0, r * 0.82, r, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = 'rgba(255,255,255,0.45)';
      ctx.lineWidth = Math.max(1.2, size * 0.08);
      ctx.beginPath();
      ctx.arc(-r * 0.18, -r * 0.1, r * 0.48, Math.PI * 1.2, Math.PI * 1.9);
      ctx.stroke();

      ctx.strokeStyle = itemDef.accent;
      ctx.lineWidth = Math.max(1.4, size * 0.1);
      if (itemDef.hatchRole === 'offensive') {
        ctx.beginPath();
        ctx.moveTo(-r * 0.18, -r * 0.1);
        ctx.lineTo(r * 0.05, -r * 0.34);
        ctx.lineTo(r * 0.3, -r * 0.08);
        ctx.lineTo(r * 0.04, r * 0.12);
        ctx.lineTo(r * 0.26, r * 0.36);
        ctx.stroke();
      } else if (itemDef.hatchRole === 'worker') {
        ctx.beginPath();
        ctx.arc(0, 0, r * 0.26, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, -r * 0.26);
        ctx.lineTo(0, r * 0.26);
        ctx.moveTo(-r * 0.26, 0);
        ctx.lineTo(r * 0.26, 0);
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.moveTo(-r * 0.26, r * 0.12);
        ctx.quadraticCurveTo(0, -r * 0.36, r * 0.26, r * 0.12);
        ctx.quadraticCurveTo(0, r * 0.34, -r * 0.26, r * 0.12);
        ctx.stroke();
      }
      ctx.restore();
    }

    function incubateEgg(itemId) {

      colony.assignedEnemyId = null;
